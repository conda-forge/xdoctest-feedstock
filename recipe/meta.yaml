{% set name = "xdoctest" %}
{% set version = "1.3.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: bf6078c4fc0d60aafd8753fccdc435c95f26a640508e606d188d96f48359f0aa

build:
  noarch: python
  number: 0
  entry_points:
    - xdoctest = xdoctest.__main__:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=41.0.1
  run:
    - python >={{ python_min }}
  run_constrained:
    - attrs >=19.2.0
    - debugpy >=1.6.0
    - ipykernel >=6.0.0
    - ipython >=7.23.1
    - ipython_genutils >=0.2.0
    - jedi >=0.16.0
    - jupyter_client >=7.0.0
    - jupyter_core >=4.7.0
    - nbconvert >=6.1.0
    - pyflakes >=2.2.0
    - pygments >=2.15.1

test:
  requires:
    - pyflakes >=2.2.0
    - python {{ python_min }}
    - pytest >=6.25
    - pytest-cov >=3.0
    - tomli >=0.2.0
  source_files:
    - pytest.ini
    - tests
  imports:
    - xdoctest
    - xdoctest.docstr
    - xdoctest.utils
  commands:
    - xdoctest --help
    - pytest -k "not test_run_binary_doctests"

about:
  home: https://github.com/Erotemic/xdoctest
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: A rewrite of Python's builtin doctest module without all the weirdness (with pytest plugin integration)
  description: |
    The xdoctest package is a re-write of Python's builtin doctest module.
    It replaces the old regex-based parser with a new abstract-syntax-tree
    based parser (using Python's ast module). The goal is to make doctests
    easier to write, simpler to configure, and encourage the pattern of test
    driven development.
  doc_url: http://xdoctest.readthedocs.io/
  dev_url: https://github.com/Erotemic/xdoctest

extra:
  recipe-maintainers:
    - Zeitsperre
    - mdraw
